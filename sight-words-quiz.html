<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sight Words Adventure!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2744;
    --yellow: #FFD93D;
    --blue: #6EC6F5;
    --white: #F0F8FF;
    --green: #4CAF50;
    --red: #E05C5C;
    --purple: #9B6FD4;
    --orange: #FF8C42;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 24px 16px 8px;
  }

  h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 3px 0 #b89820;
    letter-spacing: -0.5px;
  }

  .tabs {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 12px;
    margin: 16px 0 24px;
    padding: 0 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tab-btn {
    padding: 10px 22px;
    border-radius: 999px;
    border: 3px solid transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: var(--white);
    transition: all 0.15s;
  }
  .tab-btn:hover { background: rgba(255,255,255,0.15); }
  .tab-btn.active { background: var(--yellow); color: var(--navy); border-color: #b89820; }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 0 16px 40px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ── LEVEL SELECT ── */
  .level-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .level-card {
    border-radius: 20px;
    padding: 24px 16px 32px;
    text-align: center;
    cursor: pointer;
    border: 4px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .level-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .level-card.l1 { background: linear-gradient(135deg, #4CAF50, #2e7d32); border-color: #81c784; }
  .level-card.l2 { background: linear-gradient(135deg, #2196F3, #1565c0); border-color: #64b5f6; }
  .level-card.l3 { background: linear-gradient(135deg, #9B6FD4, #6a1b9a); border-color: #ce93d8; }
  .level-card.l4 { background: linear-gradient(135deg, #FF8C42, #e65100); border-color: #ffb74d; }

  .level-card .word-count {
    position: absolute;
    top: 10px; right: 12px;
    font-size: 12px;
    font-weight: 800;
    background: rgba(0,0,0,0.25);
    padding: 2px 8px;
    border-radius: 999px;
  }
  .level-card .badge { font-size: 36px; display: block; margin-bottom: 8px; }
  .level-card h2 { font-size: 20px; font-weight: 900; }
  .level-card p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  /* Done overlay */
  .done-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    border-radius: 16px;
    align-items: top;
    justify-content: left;
    font-size: 16px;
    font-weight: 900;
    color: var(--yellow);
    letter-spacing: 1px;
    pointer-events: none;
    padding: 20px;
  }
  .level-card.done { cursor: default; }
  .level-card.done:hover { transform: none; box-shadow: none; }
  .level-card.done .done-overlay { display: flex; }

  /* ── QUIZ SCREEN ── */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  .progress-wrap { flex: 1; margin: 0 16px; }
  .progress-bar {
    height: 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--yellow);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    margin-top: 4px;
    opacity: 0.8;
  }

  .word-card {
    background: rgba(255,255,255,0.06);
    border: 3px solid rgba(255,255,255,0.12);
    border-radius: 28px;
    padding: 48px 24px;
    text-align: center;
    margin-bottom: 24px;
  }

  .word-display {
    font-size: clamp(64px, 18vw, 120px);
    font-weight: 900;
    color: var(--yellow);
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 4px 0 #8a6800;
  }

  .next-btn {
    display: block;
    width: 100%;
    padding: 18px;
    border-radius: 18px;
    border: none;
    background: var(--yellow);
    color: var(--navy);
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 5px 0 #8a6800;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #8a6800; }
  .next-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #8a6800; }

  /* ── CONFETTI ── */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  /* ── COMPLETE SCREEN ── */
  .complete-card {
    background: rgba(255,255,255,0.06);
    border: 3px solid rgba(255,217,61,0.3);
    border-radius: 28px;
    padding: 40px 24px;
    text-align: center;
  }
  .complete-card .big-emoji { font-size: 72px; display: block; margin-bottom: 16px; }
  .complete-card h2 { font-size: 36px; font-weight: 900; color: var(--yellow); margin-bottom: 8px; }
  .complete-card p { font-size: 18px; opacity: 0.85; margin-bottom: 24px; }
  .score-display { font-size: 52px; font-weight: 900; color: var(--yellow); }
  .score-display span { font-size: 22px; opacity: 0.7; }

  /* ── FLASHCARD SCREEN ── */
  .flashcard-level-select {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    justify-content: center;
  }
  .fc-level-btn {
    padding: 8px 18px;
    border-radius: 999px;
    border: 2px solid rgba(255,255,255,0.25);
    background: transparent;
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
  }
  .fc-level-btn.active { background: var(--yellow); color: var(--navy); border-color: #b89820; }

  .flashcard {
    background: linear-gradient(135deg, rgba(110,198,245,0.12), rgba(155,111,212,0.12));
    border: 4px solid rgba(110,198,245,0.3);
    border-radius: 32px;
    padding: 60px 24px;
    text-align: center;
    margin-bottom: 24px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .flashcard:hover { transform: scale(1.02); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
  .flashcard:active { transform: scale(0.98); }
  .fc-word {
    font-size: clamp(56px, 16vw, 104px);
    font-weight: 900;
    color: var(--blue);
    letter-spacing: 6px;
    text-shadow: 0 4px 0 #1a4a6a;
    transition: opacity 0.15s;
  }
  .fc-tap-hint { font-size: 14px; opacity: 0.5; font-weight: 700; margin-top: 16px; letter-spacing: 1px; }

  .fc-controls { display: flex; gap: 14px; }
  .fc-btn {
    flex: 1;
    padding: 16px;
    border-radius: 16px;
    border: 3px solid;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
  }
  .fc-btn.got-it { background: rgba(76,175,80,0.15); border-color: var(--green); color: #a5d6a7; }
  .fc-btn.try-again { background: rgba(255,140,66,0.15); border-color: var(--orange); color: #ffcc80; }
  .fc-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
  .fc-score { text-align: center; margin-top: 16px; font-size: 15px; font-weight: 700; opacity: 0.7; }

  @keyframes starPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .star-anim { display: inline-block; animation: starPop 0.35s ease forwards; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
  <h1>⭐ Sight Words Adventure!</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('levels')">📋 Quiz</button>
  <button class="tab-btn" onclick="showTab('flashcards')">🃏 Flashcards</button>
</div>

<main>

  <!-- LEVEL SELECT -->
  <div class="screen active" id="screen-levels">
    <div class="level-grid">

      <div class="level-card l1" id="card-1" onclick="startQuiz(1)">
        <div class="word-count" id="count-1"></div>
        <span class="badge">🌱</span>
        <h2>Easy</h2>
        <p>Getting started</p>
        <div class="done-overlay">⭐ Done!</div>
      </div>

      <div class="level-card l2" id="card-2" onclick="startQuiz(2)">
        <div class="word-count" id="count-2"></div>
        <span class="badge">🌟</span>
        <h2>Medium</h2>
        <p>Building up</p>
        <div class="done-overlay">⭐ Done!</div>
      </div>

      <div class="level-card l3" id="card-3" onclick="startQuiz(3)">
        <div class="word-count" id="count-3"></div>
        <span class="badge">🚀</span>
        <h2>Hard</h2>
        <p>Getting tricky</p>
        <div class="done-overlay">⭐ Done!</div>
      </div>

      <div class="level-card l4" id="card-4" onclick="startQuiz(4)">
        <div class="word-count" id="count-4"></div>
        <span class="badge">🏆</span>
        <h2>Expert</h2>
        <p>Word champion!</p>
        <div class="done-overlay">⭐ Done!</div>
      </div>

    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
    </div>
    <div class="word-card">
      <div class="word-display" id="wordDisplay"></div>
    </div>
    <button class="next-btn" onclick="nextQuestion()">Next Word →</button>
  </div>

  <!-- COMPLETE SCREEN -->
  <div class="screen" id="screen-complete">
    <div class="complete-card">
      <span class="big-emoji" id="completeEmoji">🎉</span>
      <h2 id="completeTitle">You did it!</h2>
      <div class="score-display" id="completeScore"></div>
      <p id="completeMsg" style="margin-top:12px"></p>
      <button class="next-btn" onclick="goBack()" style="margin-top:24px">Back to Levels</button>
    </div>
  </div>

  <!-- FLASHCARD SCREEN -->
  <div class="screen" id="screen-flashcards">
    <div class="flashcard-level-select">
      <button class="fc-level-btn active" onclick="setFCLevel(0)">All</button>
      <button class="fc-level-btn" onclick="setFCLevel(1)">Easy</button>
      <button class="fc-level-btn" onclick="setFCLevel(2)">Medium</button>
      <button class="fc-level-btn" onclick="setFCLevel(3)">Hard</button>
      <button class="fc-level-btn" onclick="setFCLevel(4)">Expert</button>
    </div>
    <div class="flashcard" onclick="nextFlashcard()">
      <div class="fc-word" id="fcWord">tap!</div>
      <div class="fc-tap-hint">tap for next word</div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn try-again" onclick="fcMark(false)">🔁 Try Again</button>
      <button class="fc-btn got-it" onclick="fcMark(true)">✅ Got it!</button>
    </div>
    <div class="fc-score" id="fcScore"></div>
  </div>

</main>

<script>
const WORDS = {
  1: ['are','a','I','the','is','in','it','to','and','on','at','for','go','he','has','me','my','no','so', 'of','see', 'up','we','you'],
  2: ['am','an','as','be','by','do','go','if','of','or','us','are','can','come','did','for','get','got','had','has','have','him','his','how','its','let','not','now','off','old','one','our','out','put','ran','run','sat','saw','say','set','she','six','ten','the','this','they','two','use','was','way','who','why','you'],
  3: ['again','also','around','because','been','best','both','buy','call','came','come','could','down','each','eat','even','find','first','five','four','from','give','good','grow','have','help','here','hold','home','hurt','just','keep','kind','know','last','left','like','live','look','long','made','make','many','more','most','much','must','name','need','new','next','nice','nine','only','open','over','play','pull','read','ride','right','said','same','show','sing','sit','some','soon','stop','sure','take','tell','than','that','them','then','there','these','they','think','this','those','three','time','too','told','try','turn','upon','very','walk','want','well','went','were','what','when','where','which','while','with','work','year','your'],
  4: ['above','across','always','another','answer','anyone','anywhere','beautiful','before','between','bought','brought','build','built','carry','caught','change','children','choose','city','clean','clear','close','color','comes',"couldn't",'cried','decided','different','done','door','during','early','else','enough','ever','every','everything','except','eyes','face','fall','family','far','father','favorite','feel','feet','finally','follow','found','front','full','gave','goes','gone','great','group','guess','hands','happen','hard','hear','heart','heavy','hold','hope','hours','house','idea','inside','instead','just','knew','large','later','learned','leave','light','listen','little','might','mind','minutes','money','month','morning','mother','move','never','nothing','notice','number','often','once','other','outside','own','part','people','place','plan','point','possible','probably','problem','pull','question','quickly','quiet','ready','really','remember','river','school','second','seems','several','should','since','small','something','sometimes','sound','start','still','story','straight','sudden','taken','talking','things','thought','thousand','through','together','toward','town','trees','trouble','true','turned','under','until','upon','usually','voice','water','window','without','wonderful','world','would','write','written','young']
};

let completedLevels = new Set();
let currentLevel = 1;
let quizWords = [];
let quizIndex = 0;

let fcLevel = 0;
let fcPool = [];
let fcIndex = 0;
let fcGot = 0;
let fcTotal = 0;

function init() {
  for (let l = 1; l <= 4; l++) {
    document.getElementById('count-' + l).textContent = (WORDS[l].length+1) + ' words';
  }
  initFlashcards();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', (i === 0 && tab === 'levels') || (i === 1 && tab === 'flashcards'));
  });
  if (tab === 'levels') {
    showScreen('levels');
  } else {
    showScreen('flashcards');
    initFlashcards();
  }
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + name).classList.add('active');
}

function startQuiz(level) {
  if (completedLevels.has(level)) return;
  currentLevel = level;
  quizWords = shuffle(WORDS[level]).slice(0, 20);
  quizIndex = 0;
  showScreen('quiz');
  showQuestion();
}

function showQuestion() {
  var word = quizWords[quizIndex];
  var total = quizWords.length;
  document.getElementById('progressFill').style.width = ((quizIndex / total) * 100) + '%';
  document.getElementById('progressLabel').textContent = (quizIndex + 1) + ' of ' + total;
  document.getElementById('wordDisplay').textContent = word;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizWords.length) {
    showComplete();
  } else {
    showQuestion();
  }
}

// ── CONFETTI ──────────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('confetti-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var animId = null;
  var COLORS = ['#FFD93D','#6EC6F5','#4CAF50','#FF8C42','#9B6FD4','#F0F8FF','#E05C5C'];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  function launch() {
    resize();
    particles = [];
    // Burst from top-center
    for (var i = 0; i < 120; i++) {
      particles.push({
        x: canvas.width * randomBetween(0.3, 0.7),
        y: canvas.height * -0.05,
        vx: randomBetween(-6, 6),
        vy: randomBetween(2, 9),
        w: randomBetween(8, 14),
        h: randomBetween(5, 9),
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        angle: randomBetween(0, Math.PI * 2),
        spin: randomBetween(-0.18, 0.18),
        gravity: randomBetween(0.18, 0.28),
        opacity: 1
      });
    }
    if (animId) cancelAnimationFrame(animId);
    var start = null;
    var DURATION = 3200;
    function step(ts) {
      if (!start) start = ts;
      var elapsed = ts - start;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var allGone = true;
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.angle += p.spin;
        p.opacity = Math.max(0, 1 - (elapsed / DURATION));
        if (p.y < canvas.height + 20) allGone = false;
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      if (!allGone && elapsed < DURATION) {
        animId = requestAnimationFrame(step);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        animId = null;
      }
    }
    animId = requestAnimationFrame(step);
  }

  window.launchConfetti = launch;
})();

function showComplete() {
  completedLevels.add(currentLevel);
  document.getElementById('card-' + currentLevel).classList.add('done');
  document.getElementById('completeEmoji').textContent = '🏆';
  document.getElementById('completeTitle').textContent = 'You did it!';
  document.getElementById('completeScore').innerHTML = '+15<span> minutes!</span>';
  document.getElementById('completeMsg').textContent = quizWords.length + ' words crushed — screen time earned! 🎉';
  showScreen('complete');
  launchConfetti();
}

function goBack() {
  showScreen('levels');
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  document.querySelectorAll('.tab-btn')[1].classList.remove('active');
}

function initFlashcards() {
  setFCLevel(fcLevel);
}

function setFCLevel(level) {
  fcLevel = level;
  document.querySelectorAll('.fc-level-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === level);
  });
  if (level === 0) {
    fcPool = shuffle([].concat(WORDS[1], WORDS[2], WORDS[3], WORDS[4]));
  } else {
    fcPool = shuffle(WORDS[level].slice());
  }
  fcIndex = 0;
  fcGot = 0;
  fcTotal = 0;
  showFlashcard();
}

function showFlashcard() {
  if (fcPool.length === 0) return;
  var word = fcPool[fcIndex % fcPool.length];
  var el = document.getElementById('fcWord');
  el.style.opacity = '0';
  setTimeout(function() {
    el.textContent = word;
    el.style.opacity = '1';
  }, 80);
  updateFCScore();
}

function nextFlashcard() {
  fcIndex = (fcIndex + 1) % fcPool.length;
  if (fcIndex === 0) fcPool = shuffle(fcPool);
  showFlashcard();
}

function fcMark(gotIt) {
  if (gotIt) fcGot++;
  fcTotal++;
  nextFlashcard();
}

function updateFCScore() {
  var el = document.getElementById('fcScore');
  el.textContent = fcTotal === 0 ? 'Tap the card to go to the next word' : 'Got it: ' + fcGot + ' / ' + fcTotal + ' tries';
}

init();
</script>
</body>
</html>
